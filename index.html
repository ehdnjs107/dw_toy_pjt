<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DW Pages</title>
  <style>
    :root {
      --bg: #0a0f0d;
      --surface: #111a14;
      --border: rgba(82, 183, 136, 0.15);
      --green: #52b788;
      --gold: #c9a84c;
      --text: #f0f4f0;
      --text-muted: #7a9e87;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 3.5rem 1.5rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .header-badge {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--gold);
      border: 1px solid rgba(201, 168, 76, 0.4);
      padding: 0.25rem 0.9rem;
      border-radius: 50px;
      margin-bottom: 1rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header h1 span { color: var(--green); }

    header p {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    main {
      flex: 1;
      padding: 2.5rem 1.5rem;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      display: block;
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
    }

    .card:hover {
      border-color: var(--green);
      transform: translateY(-3px);
    }

    .card-thumb {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      filter: brightness(0.75) saturate(1.1);
      transition: filter 0.3s;
    }

    .card:hover .card-thumb { filter: brightness(0.9) saturate(1.2); }

    .card-body { padding: 1.2rem 1.3rem; }

    .card-tag {
      display: inline-block;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      color: var(--green);
      border: 1px solid rgba(82, 183, 136, 0.35);
      padding: 0.15rem 0.55rem;
      border-radius: 50px;
      margin-bottom: 0.6rem;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.35rem;
      letter-spacing: -0.01em;
    }

    .card-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .card-footer {
      margin-top: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-date { font-size: 0.68rem; color: rgba(122, 158, 135, 0.6); }

    .card-arrow {
      font-size: 0.75rem;
      color: var(--green);
      letter-spacing: 0.05em;
    }

    /* 준비중 카드 */
    .card.coming-soon {
      opacity: 0.4;
      pointer-events: none;
    }

    .card.coming-soon .card-thumb {
      filter: brightness(0.3) saturate(0);
    }

    .coming-badge {
      display: inline-block;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      border: 1px solid rgba(122, 158, 135, 0.3);
      padding: 0.15rem 0.55rem;
      border-radius: 50px;
      margin-bottom: 0.6rem;
    }

    footer {
      padding: 1.8rem 1.5rem;
      text-align: center;
      border-top: 1px solid var(--border);
    }

    footer p {
      font-size: 0.68rem;
      color: rgba(122, 158, 135, 0.4);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-badge">DW PAGES</div>
    <h1>DW의 <span>웹 프로젝트</span></h1>
    <p>클로드와 함께 만드는 정보성 페이지 모음</p>
  </header>

  <main>
    <div class="section-label">Projects</div>
    <div class="cards">

      <!-- 가상공중정원 -->
      <a class="card" href="./skygarden/">
        <img class="card-thumb"
          src="https://images.unsplash.com/photo-1563911302283-d2bc129e7570?w=800&q=80&fit=crop"
          alt="가상공중정원" />
        <div class="card-body">
          <div class="card-tag">공원 안내</div>
          <div class="card-title">가상공중정원</div>
          <div class="card-desc">서울 하늘구에 위치한 공중 생태공원 공식 안내 페이지. 공원 역사, 이용 안내, 약도, 오시는 길 수록.</div>
          <div class="card-footer">
            <span class="card-date">2026.04.20</span>
            <span class="card-arrow">바로가기 →</span>
          </div>
        </div>
      </a>

      <!-- 준비중 슬롯 -->
      <div class="card coming-soon">
        <img class="card-thumb"
          src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=800&q=80&fit=crop"
          alt="준비중" />
        <div class="card-body">
          <div class="coming-badge">COMING SOON</div>
          <div class="card-title">다음 프로젝트</div>
          <div class="card-desc">새로운 페이지가 곧 추가됩니다.</div>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <p>© 2026 DW Pages — Made with Claude</p>
  </footer>

</body>
</html>
