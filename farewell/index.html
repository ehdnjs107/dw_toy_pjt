<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이수정 퇴사 축하 🎉</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background: linear-gradient(160deg, #0d0d1a 0%, #1a0a2e 40%, #0a1a2e 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* ── CONFETTI ── */
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* ── BUBBLE ZONE ── */
        #bubble-zone {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 110px;
            overflow: hidden;
            z-index: 200;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 50px;
            padding: 8px 20px;
            white-space: nowrap;
            font-size: 13px;
            color: white;
            animation: floatBubble linear;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .bubble strong { color: #ffd700; }

        @keyframes floatBubble {
            from { transform: translateX(110vw); }
            to   { transform: translateX(-120%); }
        }

        /* ── MAIN ── */
        .main {
            padding-top: 120px;
            padding-bottom: 80px;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            padding: 70px 20px 50px;
            position: relative;
        }

        .stars-bg {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 4px; height: 4px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50%       { opacity: 1;   transform: scale(1.5); }
        }

        .main-name {
            font-size: clamp(3.5rem, 10vw, 7rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 40%, #ff4d6d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
            animation: namePulse 2.5s ease-in-out infinite;
        }

        @keyframes namePulse {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 20px rgba(255,215,0,0.4)); }
            50%       { filter: brightness(1.2) drop-shadow(0 0 40px rgba(255,140,0,0.7)); }
        }

        .congrats-msg {
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 30px rgba(255,215,0,0.8);
            margin-bottom: 12px;
        }

        .sub-msg {
            color: #aaa;
            font-size: 1rem;
            margin-bottom: 24px;
            line-height: 1.7;
        }

        .emoji-row {
            font-size: 2.2rem;
            display: inline-block;
            animation: swing 1.5s ease-in-out infinite;
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-8deg); }
            50%       { transform: rotate(8deg); }
        }

        /* ── DIVIDER ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
            margin: 10px 30px;
        }

        /* ── D-DAY ── */
        .dday-section {
            text-align: center;
            padding: 60px 20px;
        }

        .dday-label {
            font-size: clamp(1rem, 3vw, 1.4rem);
            color: #aaa;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .dday-number {
            font-size: clamp(6rem, 25vw, 16rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #ffd700, #ff4d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            animation: ddayGlow 2s ease-in-out infinite;
        }

        @keyframes ddayGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255,215,0,0.4)); }
            50%       { filter: drop-shadow(0 0 60px rgba(255,77,109,0.7)); }
        }

        .dday-sub {
            font-size: 1rem;
            color: #666;
            margin-top: 12px;
        }

        /* ── CLOCK ── */
        .clock-section {
            max-width: 720px;
            margin: 0 auto 20px;
            padding: 40px 30px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 28px;
            letter-spacing: 0.05em;
        }

        .clock-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .clock-unit { text-align: center; }

        .clock-value {
            display: block;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            color: #ffd700;
            font-variant-numeric: tabular-nums;
            background: rgba(255,215,0,0.08);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 12px;
            padding: 10px 18px;
            min-width: 90px;
        }

        .clock-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 6px;
        }

        .clock-sep {
            font-size: 3rem;
            font-weight: 900;
            color: #ffd700;
            opacity: 0.6;
            animation: blink 1s step-end infinite;
            align-self: center;
            padding-bottom: 20px;
        }

        @keyframes blink { 0%, 100% { opacity: 0.6; } 50% { opacity: 0.1; } }

        #clock-done {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffd700;
            display: none;
        }

        /* ── SLIDESHOW ── */
        .slideshow-section {
            padding: 60px 20px;
            text-align: center;
        }

        .slideshow-wrap {
            position: relative;
            max-width: 480px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255,215,0,0.2), 0 20px 60px rgba(0,0,0,0.5);
            background: rgba(255,255,255,0.03);
        }

        .slide-img {
            width: 100%;
            max-height: 420px;
            object-fit: contain;
            display: none;
            transition: opacity 0.5s;
        }

        .slide-img.active { display: block; }

        .slide-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.4);
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 10px 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .slide-btn:hover { background: rgba(255,215,0,0.3); }
        .slide-btn.prev { left: 8px; }
        .slide-btn.next { right: 8px; }

        .slide-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            cursor: pointer;
            transition: all 0.3s;
        }

        .dot.active {
            background: #ffd700;
            transform: scale(1.3);
        }

        /* ── TODO ── */
        .todo-section {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .todo-list { list-style: none; }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.25s;
            user-select: none;
        }

        .todo-item:hover {
            background: rgba(255,215,0,0.08);
            border-color: rgba(255,215,0,0.25);
            transform: translateX(4px);
        }

        .todo-item.done {
            color: #555;
            text-decoration: line-through;
        }

        .todo-check {
            width: 26px; height: 26px;
            border: 2px solid #ffd700;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
            transition: all 0.25s;
        }

        .todo-item.done .todo-check {
            background: #ffd700;
            color: #000;
            font-weight: 900;
        }

        .todo-text { flex: 1; }

        .todo-del {
            flex-shrink: 0;
            background: rgba(255,80,80,0.12);
            border: 1px solid rgba(255,80,80,0.25);
            border-radius: 8px;
            color: #ff6060;
            font-size: 0.75rem;
            padding: 4px 10px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .todo-del:hover {
            background: rgba(255,80,80,0.25);
            border-color: rgba(255,80,80,0.5);
        }

        .todo-del.nope {
            background: rgba(255,215,0,0.15);
            border-color: #ffd700;
            color: #ffd700;
            font-weight: 700;
        }

        /* ── GUESTBOOK ── */
        .guestbook-section {
            max-width: 620px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .gb-form {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 12px 14px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.25s;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(255,215,0,0.04);
        }

        .form-group textarea { height: 90px; }

        ::placeholder { color: #555; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255,215,0,0.35);
        }

        .gb-entries { display: flex; flex-direction: column; gap: 12px; }

        .gb-entry {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-left: 3px solid #ffd700;
            border-radius: 14px;
            padding: 18px 20px;
        }

        .entry-name {
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        .entry-msg {
            color: #ccc;
            line-height: 1.65;
            word-break: break-all;
        }

        .entry-date {
            font-size: 0.72rem;
            color: #444;
            margin-top: 8px;
        }

        /* ── VISITOR ── */
        .visitor {
            text-align: center;
            padding: 30px 20px 60px;
            color: #444;
            font-size: 0.85rem;
        }

        /* ── SECTION PADDING ── */
        .pad { padding: 0 20px; }

        @media (max-width: 500px) {
            .clock-value { min-width: 68px; padding: 8px 10px; }
            .clock-sep   { font-size: 2rem; }
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div id="bubble-zone"></div>

<div class="main">

    <!-- HEADER -->
    <section class="header">
        <div class="stars-bg" id="stars-bg"></div>
        <div class="main-name">이수정</div>

        <p class="sub-msg">혼자만 도망치다니 세상이 아주 아름답지?</p>

                <span class="clock-value" id="c-hours">00</span>

    <!-- SLIDESHOW -->
    <section class="slideshow-section">
        <div class="section-title">📸 이수정 퇴사 기념 짤</div>
        <div class="slideshow-wrap">
            <img src="../uploads/가영이짤.png"     class="slide-img active" alt="짤1">
            <img src="../uploads/도비짤.jpeg"      class="slide-img"        alt="짤2">
            <img src="../uploads/사표짤.png"       class="slide-img"        alt="짤3">
            <img src="../uploads/속시원 퇴사.png"  class="slide-img"        alt="짤4">
            <img src="../uploads/퇴사축하.png"     class="slide-img"        alt="짤5">
            <button class="slide-btn prev" onclick="moveSlide(-1)">&#8249;</button>
            <button class="slide-btn next" onclick="moveSlide(1)">&#8250;</button>
        </div>
        <div class="slide-dots" id="slide-dots">
            <div class="dot active" onclick="goSlide(0)"></div>
            <div class="dot" onclick="goSlide(1)"></div>

            <div class="dot" onclick="goSlide(3)"></div>

    <div class="divider"></div>

    <!-- TODO -->
    <section class="todo-section">
        <div class="section-title" style="text-align:center;">📋 퇴사 후 할 일 목록</div>
        <ul class="todo-list" id="todo-list"></ul>
    </section>

    <div class="divider"></div>

    <!-- GUESTBOOK -->
    <section class="guestbook-section">
        <div class="section-title" style="text-align:center;">💌 방명록</div>
        <div class="gb-form">
            <div class="form-group">
                <label>이름</label>
                <input type="text" id="gb-name" placeholder="이름을 입력하세요" maxlength="20">

                <label>메시지</label>
                <textarea id="gb-msg" placeholder="전하고 싶은 말"></textarea>

        <div class="gb-entries" id="gb-entries"></div>

</div><!-- /main -->

<script>
/* =========== STARS =========== */
(function() {
    const bg = document.getElementById('stars-bg');
    for (let i = 0; i < 40; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.cssText = `
            left: ${Math.random()*100}%;
            top: ${Math.random()*100}%;
            animation-delay: ${Math.random()*3}s;
            animation-duration: ${1.5 + Math.random()*2}s;
            width: ${2 + Math.random()*4}px;
            height: ${2 + Math.random()*4}px;
            opacity: ${0.3 + Math.random()*0.5};
        `;
        bg.appendChild(s);
    }
})();

/* =========== CONFETTI =========== */
(function() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    const resize = () => { canvas.width = innerWidth; canvas.height = innerHeight; };
    resize();
    window.addEventListener('resize', resize);

    const COLORS = ['#ffd700','#ff6b6b','#4fc3f7','#81c784','#ce93d8','#ff8a65','#ffffff','#ff4d6d','#00e5ff'];

    // 모든 조각이 화면 위에서 한꺼번에 쏟아지도록 시작 y를 음수로 설정
    const pieces = Array.from({length: 200}, () => ({
        x:     Math.random() * innerWidth,
        y:     -20 - Math.random() * 300,   // 화면 위 0~300px 사이에서 시작 (즉시 쏟아지는 효과)
        w:     6 + Math.random() * 10,
        h:     3 + Math.random() * 6,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        vy:    5 + Math.random() * 5,        // 빠르게 (5~10px/frame → 약 2~3초에 화면 통과)
        vx:    (Math.random() - 0.5) * 4,
        rot:   Math.random() * 360,
        rs:    (Math.random() - 0.5) * 8,
        alive: true,
    }));

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let anyAlive = false;
        pieces.forEach(p => {
            if (!p.alive) return;
            p.y += p.vy; p.x += p.vx; p.rot += p.rs;
            if (p.y > canvas.height + 20) { p.alive = false; return; }
            anyAlive = true;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot * Math.PI / 180);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = 0.85;
            ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
            ctx.restore();
        });
        if (anyAlive) requestAnimationFrame(loop);
        else canvas.style.display = 'none';
    }
    loop();
})();

/* =========== D-DAY =========== */
function updateDDay() {
    const now = new Date();
    const target = new Date('2026-04-30T00:00:00');
    const diff = target - now;
    const el = document.getElementById('dday-number');
    if (diff <= 0) {
        const past = Math.floor(-diff / 86400000);
        el.textContent = past === 0 ? 'D-DAY! 🎊' : `D+${past}`;
    } else {
        el.textContent = `D-${Math.ceil(diff / 86400000)}`;
    }
}
updateDDay();

/* =========== RETIREMENT CLOCK =========== */
function updateClock() {
    const now = new Date();
    const target = new Date('2026-04-30T18:00:00');
    const diff = target - now;

    if (diff <= 0) {
        document.getElementById('clock-display').style.display = 'none';
        document.getElementById('clock-done').style.display = 'block';
        return;
    }

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    document.getElementById('c-days').textContent  = String(d).padStart(2,'0');
    document.getElementById('c-hours').textContent = String(h).padStart(2,'0');
    document.getElementById('c-mins').textContent  = String(m).padStart(2,'0');
    document.getElementById('c-secs').textContent  = String(s).padStart(2,'0');
}
updateClock();
setInterval(updateClock, 1000);

/* =========== SLIDESHOW =========== */
const slides = document.querySelectorAll('.slide-img');
const dots   = document.querySelectorAll('.dot');
let cur = 0;

function goSlide(n) {
    slides[cur].classList.remove('active');
    dots[cur].classList.remove('active');
    cur = (n + slides.length) % slides.length;
    slides[cur].classList.add('active');
    dots[cur].classList.add('active');
}

function moveSlide(dir) { goSlide(cur + dir); }

setInterval(() => goSlide(cur + 1), 3500);

/* =========== TODO LIST =========== */
const TODOS = [
    '오후 3시까지 퍼질러 자기 🛌',
    '일주일에 7회 음주 🍺',
    '남자친구 만들기 💕',
    '유럽 여행 ✈️',
    '개백수 일상 공유 📸',
    '전 회사 앞에서 낮술하기 🥂',
    '머리 3일 안감기 🙅',
    '퇴직금으로 소고기 사기 🥩',
    '국토대장정 🥾',
];

(function initTodo() {
    const saved = JSON.parse(localStorage.getItem('sj_todos') || '[]');
    const ul = document.getElementById('todo-list');
    TODOS.forEach((text, i) => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (saved[i] ? ' done' : '');
        li.innerHTML = `
            <div class="todo-check">${saved[i] ? '✓' : ''}</div>
            <span class="todo-text">${text}</span>
            <button class="todo-del">삭제</button>
        `;
        li.onclick = () => {
            const isDone = li.classList.toggle('done');
            saved[i] = isDone;
            li.querySelector('.todo-check').textContent = isDone ? '✓' : '';
            localStorage.setItem('sj_todos', JSON.stringify(saved));
        };
        li.querySelector('.todo-del').addEventListener('click', e => {
            e.stopPropagation();
            const btn = e.currentTarget;
            if (btn.classList.contains('nope')) return;
            btn.textContent = '되겠냐?';
            btn.classList.add('nope');
            setTimeout(() => {
                btn.textContent = '삭제';
                btn.classList.remove('nope');
            }, 1500);
        });
        ul.appendChild(li);
    });
})();

/* =========== GUESTBOOK =========== */
const JB = {
    id:  '69eb1638856a68218968ffbc',
    key: '$2a$10$rzik04bmILmxmtcA59LAK.EZDc3bPigikzqrzNFz4fli1v/WhwMAe',
    url() { return `https://api.jsonbin.io/v3/b/${this.id}`; }
};

async function loadGB() {
    const res = await fetch(JB.url() + '/latest', {
        headers: { 'X-Master-Key': JB.key }
    });
    if (!res.ok) throw new Error('load failed');
    const data = await res.json();
    return data.record.entries || [];
}

async function saveGB(entries) {
    const res = await fetch(JB.url(), {
        method: 'PUT',
        headers: { 'X-Master-Key': JB.key, 'Content-Type': 'application/json' },
        body: JSON.stringify({ entries })
    });
    if (!res.ok) throw new Error('save failed');
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function renderGB() {
    const container = document.getElementById('gb-entries');
    container.innerHTML = '<p style="color:#555;text-align:center;padding:20px;">불러오는 중...</p>';
    try {
        const entries = await loadGB();
        container.innerHTML = entries.length === 0
            ? '<p style="color:#555;text-align:center;padding:20px;">아직 방명록이 없어요. 첫 번째로 남겨보세요! 💛</p>'
            : '';
        [...entries].reverse().forEach(e => {
            const div = document.createElement('div');
            div.className = 'gb-entry';
            div.innerHTML = `
                <div class="entry-name">${escHtml(e.name)}</div>
                <div class="entry-msg">${escHtml(e.msg)}</div>
                <div class="entry-date">${e.date}</div>
            `;
            container.appendChild(div);
        });
        startBubbles(entries);
    } catch {
        container.innerHTML = '<p style="color:#555;text-align:center;padding:20px;">방명록을 불러오지 못했어요 😢</p>';
    }
}

async function submitGB() {
    const name = document.getElementById('gb-name').value.trim();
    const msg  = document.getElementById('gb-msg').value.trim();
    if (!name || !msg) { alert('이름과 메시지를 모두 입력해주세요!'); return; }

    const btn = document.querySelector('.submit-btn');
    btn.disabled = true;
    btn.textContent = '저장 중...';

    try {
        const entries = await loadGB();
        const now = new Date();
        entries.push({
            name, msg,
            date: now.toLocaleDateString('ko-KR') + ' ' + now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'})
        });
        await saveGB(entries);
        document.getElementById('gb-name').value = '';
        document.getElementById('gb-msg').value = '';
        await renderGB();
    } catch {
        alert('저장에 실패했어요. 잠시 후 다시 시도해주세요.');
    }

    btn.disabled = false;
    btn.textContent = '방명록 남기기 ✉️';
}

/* =========== FLOATING BUBBLES =========== */
const bubbleZone = document.getElementById('bubble-zone');
let bubbleTimers = [];

function startBubbles(entries) {
    bubbleTimers.forEach(t => clearTimeout(t));
    bubbleTimers = [];
    bubbleZone.innerHTML = '';
    if (!entries.length) return;

    const interval = Math.max(12000, entries.length * 14000);

    entries.forEach((e, i) => {
        function spawnLoop() {
            spawnBubble(e);
            const t = setTimeout(spawnLoop, interval);
            bubbleTimers.push(t);
        }
        const t = setTimeout(spawnLoop, i * 14000);
        bubbleTimers.push(t);
    });
}

function spawnBubble(entry) {
    const el = document.createElement('div');
    el.className = 'bubble';
    const dur  = 12 + Math.random() * 8;
    const top  = 10 + Math.random() * 72;
    el.style.top             = top + 'px';
    el.style.animationDuration = dur + 's';
    const preview = entry.msg.length > 36 ? entry.msg.slice(0, 36) + '…' : entry.msg;
    el.innerHTML = `<strong>${escHtml(entry.name)}</strong>: ${escHtml(preview)}`;
    bubbleZone.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000);
}


/* =========== INIT =========== */
renderGB();
</script>
